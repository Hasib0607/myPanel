services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: panel_main
      POSTGRES_USER: panel_user
      POSTGRES_PASSWORD: panel_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel_user -d panel_main"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p1
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: panel_user
      DB_PASSWORD: panel_pass
      DB_NAME: panel_main
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
